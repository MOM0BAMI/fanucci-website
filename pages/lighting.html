<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighting | Fanucci</title>

    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="container">
        <div class="header-inner">
            <a href="../index.html" class="logo">FANUCCI</a>
            <nav class="nav">
                <a href="lighting.html">Lighting</a>
                <a href="#">Fasteners</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </div>
</header>

<div class="container-fluid mt-4">
    <div class="row">
        <!-- FILTERS SIDEBAR -->
        <aside class="col-md-3 filters">
            <h4>Filters</h4>

            <div class="filter-group">
                <label for="search">Search Model</label>
                <input type="text" id="search" placeholder="e.g., SC5225-C" class="form-control">
            </div>

            <div class="filter-group">
                <label for="categoryFilter">Category</label>
                <select id="categoryFilter" class="form-control">
                    <option value="">All Categories</option>
                    <option value="Ceiling Lights">Ceiling Lights</option>
                    <option value="Pendant Lights">Pendant Lights</option>
                    <option value="Downlights">Downlights</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="wattageFilter">Wattage</label>
                <select id="wattageFilter" class="form-control">
                    <option value="">All Wattages</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="colorTempFilter">Colour Temperature</label>
                <select id="colorTempFilter" class="form-control">
                    <option value="">All Temperatures</option>
                </select>
            </div>
        </aside>

        <!-- PRODUCT GRID -->
        <main class="col-md-9">
            <div id="productGrid" class="row"></div>
        </main>
    </div>
</div>

<!-- MODAL -->
<div id="productModal" class="modal-custom">
    <div class="modal-content-custom">
        <span class="close-btn">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="../js/catalog.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true,
        offset: 50
    });
</script>
</body>
</html>
